openapi: 3.1.1
info:
  title: netbill profile-svc API
  description: API documentation for profile-svc
  version: 0.1.0

servers:
  - url: http://localhost:8002

paths:
  /profiles-svc/v1/profiles/:
    $ref: "./spec/paths/FilterProfiles.yaml"
  /profiles-svc/v1/profiles/u/{username}:
    $ref: "./spec/paths/ProfileByUsername.yaml"

  /profiles-svc/v1/profiles/me/:
    $ref: "./spec/paths/MyProfile.yaml"

  /profiles-svc/v1/profiles/me/media/:
    $ref: "./spec/paths/ProfileUploadMedia.yaml"

  /profiles-svc/v1/profiles/{account_id}:
    $ref: "./spec/paths/ProfileByID.yaml"


components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    #requests
    UpdateProfile:
      $ref: './spec/components/schemas/requests/UpdateProfile.yaml'
    DeleteUploadProfileAvatar:
      $ref: './spec/components/schemas/requests/DeleteUploadProfileAvatar.yaml'

    #responses
    Profile:
      $ref: './spec/components/schemas/responses/Profile.yaml'
    ProfileData:
      $ref: './spec/components/schemas/responses/ProfileData.yaml'
    ProfileAttributes:
      $ref: './spec/components/schemas/responses/ProfileAttributes.yaml'
    ProfilesCollection:
      $ref: './spec/components/schemas/responses/ProfilesCollection.yaml'
    UploadProfileMediaLinks:
      $ref: './spec/components/schemas/responses/UploadProfileMediaLinks.yaml'

    Errors:
      $ref: './spec/components/schemas/responses/Errors.yaml'
    PaginationData:
      $ref: './spec/components/schemas/responses/PaginationData.yaml'