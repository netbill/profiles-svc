openapi: 3.1.1
info:
  title: netbill profile-svc API
  description: API documentation for profile-svc
  version: 0.1.0
servers:
  - url: 'http://localhost:8002'
paths:
  /profiles-svc/v1/profiles/:
    get:
      tags:
        - Profiles
      summary: Filter profiles
      description: |
        Returns a paginated list of public profiles filtered by optional query parameters. Supports prefix-based filtering for `username` and `pseudonym`.
      parameters:
        - in: query
          name: text
          required: false
          schema:
            type: string
          description: |
            Text to filter profiles by. Matches against `username` and `pseudonym` fields using prefix-based filtering.
        - in: query
          name: 'page[limit]'
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
          description: Max number of items to return (1-100).
        - in: query
          name: 'page[offset]'
          required: false
          schema:
            type: integer
            minimum: 0
          description: Number of items to skip.
      responses:
        '200':
          description: Profiles list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfilesCollection'
        '500':
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Errors'
  '/profiles-svc/v1/profiles/u/{username}':
    get:
      tags:
        - Profiles
      summary: Get profile by username
      description: |
        Returns a public profile by `username`. If the profile does not exist, responds with 404.
      parameters:
        - name: username
          in: path
          required: true
          description: Username of the profile owner.
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Profile found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '404':
          description: Profile for user does not exist.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Errors'
  /profiles-svc/v1/profiles/me/:
    get:
      tags:
        - Profiles
      summary: Get my profile
      description: |
        Returns the current authenticated user's profile. Requires a valid access token.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '401':
          description: Unauthorized.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Errors'
    patch:
      tags:
        - Profiles
      summary: Update my profile
      description: |
        Updates the current authenticated user's profile. The request body must contain the same `data.id` as the authenticated account id.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfile'
      responses:
        '200':
          description: Profile updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '400':
          description: Bad request (validation error / invalid payload).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Errors'
        '401':
          description: Unauthorized (missing/invalid token or profile does not exist).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Errors'
        '403':
          description: Forbidden (user too young).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Errors'
  /profiles-svc/v1/profiles/me/media/:
    post:
      tags:
        - Profiles
      summary: Create profile upload media link
      description: |
        Creates upload media links for the profile's avatar.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Upload media links successfully created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadProfileMediaLinks'
        '401':
          description: |
            Unauthorized. Missing or invalid authorization token, or the authenticated account does not have a profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
    delete:
      tags:
        - Profiles
      summary: Delete profile upload media
      description: |
        Deletes a previously uploaded media for the profile's avatar.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteUploadProfileAvatar'
      responses:
        '200':
          description: Media successfully deleted.
        '401':
          description: |
            Unauthorized. Missing or invalid authorization token, or the authenticated account does not have a profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
  '/profiles-svc/v1/profiles/{account_id}':
    get:
      tags:
        - Profiles
      summary: Get profile by account id
      description: |
        Returns a public profile by `account_id` (UUID). If the profile does not exist, responds with 404.
      parameters:
        - name: account_id
          in: path
          required: true
          description: Account id (UUID).
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Profile found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '400':
          description: Bad request (invalid account_id).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Errors'
        '404':
          description: Profile for account does not exist.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Errors'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UpdateProfile:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - id
            - type
            - attributes
          properties:
            id:
              type: string
              format: uuid
              description: account id
            type:
              type: string
              enum:
                - profile
            attributes:
              type: object
              properties:
                pseudonym:
                  type: string
                  description: pseudonym
                description:
                  type: string
                  description: description
                avatar_key:
                  type: string
                  description: avatar media key
    DeleteUploadProfileAvatar:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - id
            - type
            - attributes
          properties:
            id:
              type: string
              format: uuid
              description: account id
            type:
              type: string
              enum:
                - profile
            attributes:
              type: object
              properties:
                avatar_key:
                  type: string
                  description: avatar media key
    Profile:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/ProfileData'
    ProfileData:
      type: object
      required:
        - id
        - type
        - attributes
      properties:
        id:
          type: string
          format: uuid
          description: account id
        type:
          type: string
          enum:
            - profile
        attributes:
          $ref: '#/components/schemas/ProfileAttributes'
    ProfileAttributes:
      type: object
      required:
        - username
        - official
        - version
        - updated_at
        - created_at
      properties:
        username:
          type: string
          description: username for this account and profile
        pseudonym:
          type: string
          description: profile pseudonym
        description:
          type: string
          description: description of profile
        avatar_url:
          type: string
          description: avatar key
        version:
          type: integer
          description: profile version
        updated_at:
          type: string
          format: date-time
          description: updated at
        created_at:
          type: string
          format: date-time
          description: created at
    ProfilesCollection:
      type: object
      required:
        - data
        - links
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ProfileData'
        links:
          $ref: '#/components/schemas/PaginationData'
    UploadProfileMediaLinks:
      type: object
      required:
        - data
        - included
      properties:
        data:
          type: object
          required:
            - id
            - type
            - attributes
            - relationships
          properties:
            id:
              type: string
              format: uuid
              description: account id
            type:
              type: string
              enum:
                - profile_upload_links
            attributes:
              type: object
              required:
                - avatar
              properties:
                avatar:
                  type: object
                  required:
                    - key
                    - upload_url
                    - preload_url
                  properties:
                    key:
                      type: string
                      description: Key for the avatar in the storage service
                    upload_url:
                      type: string
                      format: uri
                      description: Pre-signed URL for uploading the avatar
                    preload_url:
                      type: string
                      format: uri
                      description: URL for preloading the avatar after upload
            relationships:
              type: object
              properties:
                profile:
                  type: object
                  required:
                    - data
                  properties:
                    data:
                      type: object
                      required:
                        - id
                        - type
                      properties:
                        id:
                          type: string
                          format: uuid
                          description: Profile id
                        type:
                          type: string
                          enum:
                            - profile
        included:
          type: array
          items:
            $ref: '#/components/schemas/ProfileData'
    Errors:
      description: 'Standard JSON:API error'
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          description: Non empty array of errors occurred during request processing
          items:
            type: object
            required:
              - title
              - status
            properties:
              title:
                type: string
                description: 'Title is a short, human-readable summary of the problem'
                example: Bad Request
              detail:
                type: string
                description: Detail is a human-readable explanation specific to this occurrence of the problem
                example: Request body was expected
              status:
                type: integer
                description: Status is the HTTP status code applicable to this problem
                example: 400
                enum:
                  - 400
                  - 401
                  - 403
                  - 404
                  - 409
                  - 500
    PaginationData:
      type: object
      required:
        - self
      properties:
        self:
          type: string
          format: uri
          description: link to the current page
        first:
          type: string
          format: uri
          description: link to the first page
        last:
          type: string
          format: uri
          description: link to the last page
        prev:
          type: string
          format: uri
          description: link to the previous page
        next:
          type: string
          format: uri
          description: link to the next page
