openapi: 3.1.1
info:
  description: API documentation for profile-svc
  title: netbill profile-svc API
  version: 0.1.0
servers:
- url: http://localhost:8002
paths:
  /profiles-svc/v1/profiles/:
    get:
      description: |
        Returns a paginated list of public profiles filtered by optional query parameters. Supports prefix-based filtering for `username` and `pseudonym`.
      parameters:
      - description: |
          Text to filter profiles by. Matches against `username` and `pseudonym` fields using prefix-based filtering.
        explode: true
        in: query
        name: text
        required: false
        schema:
          type: string
        style: form
      - description: Max number of items to return (1-100).
        explode: true
        in: query
        name: "page[limit]"
        required: false
        schema:
          maximum: 100
          minimum: 1
          type: integer
        style: form
      - description: Number of items to skip.
        explode: true
        in: query
        name: "page[offset]"
        required: false
        schema:
          minimum: 0
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfilesCollection"
          description: Profiles list.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Errors"
          description: Internal server error.
      summary: Filter profiles
      tags:
      - Profiles
  /profiles-svc/v1/profiles/u/{username}:
    get:
      description: |
        Returns a public profile by `username`. If the profile does not exist, responds with 404.
      parameters:
      - description: Username of the profile owner.
        explode: false
        in: path
        name: username
        required: true
        schema:
          minLength: 1
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
          description: Profile found.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Errors"
          description: Profile for user does not exist.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Errors"
          description: Internal server error.
      summary: Get profile by username
      tags:
      - Profiles
  /profiles-svc/v1/profiles/me/:
    get:
      description: |
        Returns the current authenticated user's profile. Requires a valid access token.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
          description: Profile found.
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Errors"
          description: Unauthorized.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Errors"
          description: Internal server error.
      security:
      - bearerAuth: []
      summary: Get my profile
      tags:
      - Profiles
    patch:
      description: |
        Updates the current authenticated user's profile. The request body must contain the same `data.id` as the authenticated account id.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfile"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
          description: Profile updated.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Errors"
          description: Bad request (validation error / invalid payload).
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Errors"
          description: Unauthorized (missing/invalid token or profile does not exist).
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Errors"
          description: Forbidden (user too young).
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Errors"
          description: Internal server error.
      security:
      - bearerAuth: []
      summary: Update my profile
      tags:
      - Profiles
  /profiles-svc/v1/profiles/me/media/:
    delete:
      description: |
        Deletes a previously uploaded media for the profile's avatar.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteUploadProfileAvatar"
        required: true
      responses:
        "200":
          description: Media successfully deleted.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Errors"
          description: |
            Unauthorized. Missing or invalid authorization token, or the authenticated account does not have a profile.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Errors"
          description: Internal Server Error.
      security:
      - BearerAuth: []
      summary: Delete profile upload media
      tags:
      - Profiles
    post:
      description: |
        Creates upload media links for the profile's avatar.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadProfileMediaLinks"
          description: Upload media links successfully created.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Errors"
          description: |
            Unauthorized. Missing or invalid authorization token, or the authenticated account does not have a profile.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Errors"
          description: Internal Server Error.
      security:
      - BearerAuth: []
      summary: Create profile upload media link
      tags:
      - Profiles
  /profiles-svc/v1/profiles/{account_id}:
    get:
      description: |
        Returns a public profile by `account_id` (UUID). If the profile does not exist, responds with 404.
      parameters:
      - description: Account id (UUID).
        explode: false
        in: path
        name: account_id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
          description: Profile found.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Errors"
          description: Bad request (invalid account_id).
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Errors"
          description: Profile for account does not exist.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Errors"
          description: Internal server error.
      summary: Get profile by account id
      tags:
      - Profiles
