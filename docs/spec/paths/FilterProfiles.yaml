get:
  tags:
    - Profiles
  summary: Filter profiles
  description: >
    Returns a paginated list of public profiles filtered by optional query parameters.
    Supports prefix-based filtering for `username` and `pseudonym`.
  parameters:
    - in: query
      name: text
      required: false
      schema:
        type: string
      description: >
        Text to filter profiles by. Matches against `username` and `pseudonym` fields using prefix-based filtering.
    - in: query
      name: page[limit]
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
      description: Max number of items to return (1-100).
    - in: query
      name: page[offset]
      required: false
      schema:
        type: integer
        minimum: 0
      description: Number of items to skip.
  responses:
    "200":
      description: Profiles list.
      content:
        application/json:
          schema:
            $ref: "../components/schemas/responses/ProfilesCollection.yaml"

    "500":
      description: Internal server error.
      content:
        application/problem+json:
          schema:
            $ref: "../components/schemas/responses/Errors.yaml"
