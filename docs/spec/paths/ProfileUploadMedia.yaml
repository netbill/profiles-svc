post:
  tags:
    - Profiles
  summary: Create profile upload media link
  description: >
    Creates upload media links for the profile's avatar.
  security:
    - BearerAuth: [ ]
  responses:
    '200':
      description: Upload media links successfully created.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/responses/UploadProfileMediaLinks.yaml'
    '401':
      description: >
        Unauthorized. Missing or invalid authorization token,
        or the authenticated account does not have a profile.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/responses/Errors.yaml'

    '500':
      description: Internal Server Error.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/responses/Errors.yaml'

delete:
  tags:
    - Profiles
  summary: Delete profile upload media
  description: >
    Deletes a previously uploaded media for the profile's avatar.
  security:
    - BearerAuth: [ ]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/requests/DeleteUploadProfileAvatar.yaml'
  responses:
    '200':
      description: Media successfully deleted.
    '401':
      description: >
        Unauthorized. Missing or invalid authorization token,
        or the authenticated account does not have a profile.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/responses/Errors.yaml'
    '500':
      description: Internal Server Error.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/responses/Errors.yaml'